version: '3.8'

services:
  app:
    build: .
    depends_on:
      - redis
      - elasticsearch
    environment:
      - REDIS_HOST=redis
      - ELASTICSEARCH_HOST=elasticsearch
      # optionally override cache/indexing behaviour
      - USE_REDIS=True
      - USE_ELASTICSEARCH=True
    volumes:
      - ./data:/app/data
      - ./scraper.log:/app/scraper.log

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.10.0
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"